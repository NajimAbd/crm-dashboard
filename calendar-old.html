<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUQYA CRM — Calendrier</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --green-deep: #0D1A12;
    --gold: #B8965A;
    --gold-light: #D4AF7A;
    --cream: #F4ECE0;
    --bg-soft: #FAF7F1;
    --text-main: #2C2C2A;
    --text-soft: #6B6B68;
    --border-soft: #E5DECF;
    --status-done: #5A8C5A;
    --status-planned: #4A7BA6;
    --status-cancelled: #C4604E;
  }

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg-soft); font-family: 'Inter', sans-serif; color: var(--text-main); min-height: 100vh; }

  .topbar { background: var(--green-deep); color: var(--cream); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--gold); }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .brand-mark { width: 34px; height: 34px; }
  .brand-text { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 22px; color: var(--cream); }
  .brand-sub { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-top: 2px; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .nav-link { color: var(--gold-light); text-decoration: none; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .nav-link:hover { color: var(--cream); }
  .logout-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; background: rgba(224, 104, 90, 0.12); border: 1px solid rgba(224, 104, 90, 0.35); border-radius: 24px; color: #E0685A; cursor: pointer; font-size: 13px; font-family: 'Inter', sans-serif; }
  .logout-btn:hover { background: rgba(224, 104, 90, 0.22); }

  .page { max-width: 1000px; margin: 0 auto; padding: 36px 32px 60px; }
  .page-header { margin-bottom: 28px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 16px; }
  .eyebrow { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 8px; }
  h1 { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 36px; margin: 0 0 6px; color: var(--green-deep); }
  .subtitle { color: var(--text-soft); font-size: 14px; }

  .filter-tabs { display: flex; gap: 8px; }
  .filter-tab {
    padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border-soft); background: white; color: var(--text-soft);
    transition: all 0.15s;
  }
  .filter-tab.active { background: var(--green-deep); color: var(--cream); border-color: var(--green-deep); }

  .day-group { margin-bottom: 28px; }
  .day-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 600; color: var(--green-deep);
    margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--border-soft);
    display: flex; align-items: center; gap: 10px;
  }
  .day-badge {
    font-size: 11px; background: rgba(184, 150, 90, 0.15); color: #8B6E3A;
    padding: 2px 9px; border-radius: 10px; font-family: 'Inter', sans-serif; font-weight: 600;
  }

  .rdv-card {
    background: white; border: 1px solid var(--border-soft); border-radius: 12px;
    padding: 16px 20px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 16px;
    cursor: pointer; transition: box-shadow 0.15s, transform 0.15s;
  }
  .rdv-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.06); transform: translateY(-1px); }

  .rdv-time {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 700; color: var(--green-deep);
    min-width: 60px; text-align: center;
  }
  .rdv-divider { width: 1px; height: 36px; background: var(--border-soft); }
  .rdv-content { flex: 1; }
  .rdv-name { font-weight: 600; font-size: 14px; color: var(--text-main); }
  .rdv-meta { font-size: 12px; color: var(--text-soft); margin-top: 2px; }

  .status-chip { padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .status-planifie { background: rgba(74, 123, 166, 0.15); color: var(--status-planned); }
  .status-termine { background: rgba(90, 140, 90, 0.15); color: var(--status-done); }
  .status-annule { background: rgba(196, 96, 78, 0.15); color: var(--status-cancelled); }

  .empty-state, .loading-state { text-align: center; padding: 80px 24px; color: var(--text-soft); }
  .spinner { width: 28px; height: 28px; border: 2.5px solid var(--border-soft); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    .page { padding: 24px 16px 50px; }
    .rdv-time { min-width: 50px; font-size: 18px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <svg class="brand-mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="50" rx="46" ry="46" fill="none" stroke="#B8965A" stroke-width="3"/>
      <circle cx="50" cy="50" r="6" fill="#B8965A"/>
      <path d="M50 18 L50 38 M50 62 L50 82 M18 50 L38 50 M62 50 L82 50" stroke="#B8965A" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <div>
      <div class="brand-text">RUQYA CRM</div>
      <div class="brand-sub">Plateforme praticiens</div>
    </div>
  </div>
  <div class="topbar-right">
    <a class="nav-link" onclick="window.location.href='dashboard.html'">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Tableau de bord
    </a>
    <button class="logout-btn" onclick="logout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Déconnexion
    </button>
  </div>
</div>

<div class="page">

  <div class="page-header">
    <div>
      <div class="eyebrow">Planning</div>
      <h1>Mes rendez-vous</h1>
      <div class="subtitle" id="subtitleCount">Chargement…</div>
    </div>
    <div class="filter-tabs">
      <div class="filter-tab active" data-filter="all" onclick="setFilter('all')">Tous</div>
      <div class="filter-tab" data-filter="planifie" onclick="setFilter('planifie')">À venir</div>
      <div class="filter-tab" data-filter="termine" onclick="setFilter('termine')">Terminés</div>
    </div>
  </div>

  <div id="rdvContainer">
    <div class="loading-state">
      <div class="spinner"></div>
      <div>Chargement du calendrier…</div>
    </div>
  </div>

</div>

<script>
  const CRM_APPOINTMENTS_API = 'https://n8n.srv936251.hstgr.cloud/webhook/crm-appointments';
  const SESSION_KEY = 'crm_session_user';
  const SESSION_EXPIRY = 'crm_session_expiry';

  function getSession() {
    try {
      const raw = localStorage.getItem(SESSION_KEY);
      const expiry = parseInt(localStorage.getItem(SESSION_EXPIRY) || '0');
      if (!raw || Date.now() >= expiry) return null;
      return JSON.parse(raw);
    } catch (e) { return null; }
  }
  function logout() {
    localStorage.removeItem(SESSION_KEY);
    localStorage.removeItem(SESSION_EXPIRY);
    window.location.href = 'index.html';
  }

  const session = getSession();
  if (!session) {
    window.location.href = 'index.html';
    throw new Error('No session');
  }

  function esc(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  let allAppointments = [];
  let currentFilter = 'all';

  async function loadAppointments() {
    try {
      const resp = await fetch(CRM_APPOINTMENTS_API + '?account_id=' + encodeURIComponent(session.account_id));
      const data = await resp.json();
      allAppointments = data.appointments || [];
      document.getElementById('subtitleCount').textContent = allAppointments.length + ' rendez-vous au total';
      render();
    } catch (err) {
      document.getElementById('rdvContainer').innerHTML = '<div class="empty-state">Impossible de charger le calendrier.</div>';
    }
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.toggle('active', t.dataset.filter === f));
    render();
  }

  function render() {
    let list = allAppointments;
    if (currentFilter !== 'all') {
      list = list.filter(a => a.statut === currentFilter);
    }

    const container = document.getElementById('rdvContainer');
    if (list.length === 0) {
      container.innerHTML = '<div class="empty-state">Aucun rendez-vous dans cette catégorie.</div>';
      return;
    }

    // Grouper par jour
    const groups = {};
    list.forEach(a => {
      const d = new Date(a.date_rdv.replace(' ', 'T'));
      const key = d.toLocaleDateString('fr-FR', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
      if (!groups[key]) groups[key] = [];
      groups[key].push(a);
    });

    let html = '';
    Object.keys(groups).forEach(dayLabel => {
      const items = groups[dayLabel];
      html += '<div class="day-group">';
      html += '<div class="day-label">' + capitalize(dayLabel) + ' <span class="day-badge">' + items.length + '</span></div>';

      items.forEach(a => {
        const d = new Date(a.date_rdv.replace(' ', 'T'));
        const time = d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        const fullName = ((a.prenom || '') + ' ' + (a.nom || '')).trim() || 'Lead sans nom';
        const statusClass = 'status-' + (a.statut || 'planifie');
        const statusLabel = a.statut === 'termine' ? 'Terminé' : (a.statut === 'annule' ? 'Annulé' : 'Planifié');

        html += '<div class="rdv-card" onclick="window.location.href=\'lead-detail.html?id=' + a.lead_id + '\'">' +
          '<div class="rdv-time">' + time + '</div>' +
          '<div class="rdv-divider"></div>' +
          '<div class="rdv-content">' +
            '<div class="rdv-name">' + esc(fullName) + '</div>' +
            '<div class="rdv-meta">' + esc(a.email || '') + (a.whatsapp ? ' · ' + esc(a.whatsapp) : '') + '</div>' +
          '</div>' +
          '<span class="status-chip ' + statusClass + '">' + statusLabel + '</span>' +
        '</div>';
      });

      html += '</div>';
    });

    container.innerHTML = html;
  }

  function capitalize(s) {
    return s.charAt(0).toUpperCase() + s.slice(1);
  }

  loadAppointments();
</script>

</body>
</html>
