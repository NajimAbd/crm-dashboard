<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa — Mon mot de passe</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --green-deep: #0D1A12;
    --gold: #B8965A;
    --gold-light: #D4AF7A;
    --cream: #F4ECE0;
    --bg-soft: #FAF7F1;
    --text-main: #2C2C2A;
    --text-soft: #6B6B68;
    --border-soft: #E5DECF;
    --error: #C4604E;
    --success: #5A8C5A;
  }

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg-soft); font-family: 'Inter', sans-serif; color: var(--text-main); min-height: 100vh; }

  .topbar { background: var(--green-deep); color: var(--cream); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--gold); }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .brand-mark { width: 34px; height: 34px; }
  .brand-text { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 22px; color: var(--cream); }
  .brand-sub { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-top: 2px; }
  .nav-link { color: var(--gold-light); text-decoration: none; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .nav-link:hover { color: var(--cream); }

  .page { max-width: 480px; margin: 0 auto; padding: 60px 32px; }

  .card { background: white; border: 1px solid var(--border-soft); border-radius: 16px; padding: 36px 32px; }
  .eyebrow { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 8px; }
  h1 { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 28px; margin: 0 0 24px; color: var(--green-deep); }

  .field { margin-bottom: 16px; }
  label { display: block; font-size: 12px; color: var(--text-soft); margin-bottom: 6px; }
  input {
    width: 100%; padding: 12px 14px; border: 1px solid var(--border-soft);
    border-radius: 8px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none;
  }
  input:focus { border-color: var(--gold); }

  .pwd-wrap { position: relative; }
  .pwd-wrap input { padding-right: 44px; }
  .pwd-eye {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; padding: 4px; cursor: pointer;
    color: var(--text-soft); display: flex; align-items: center;
  }
  .pwd-eye:hover { color: var(--green-deep); }

  .submit-btn {
    width: 100%; margin-top: 8px; padding: 13px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--green-deep); font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif;
  }
  .submit-btn:disabled { opacity: 0.6; cursor: wait; }

  .msg { display: none; margin-top: 14px; padding: 11px 14px; border-radius: 8px; font-size: 13px; }
  .msg.error { background: rgba(196, 96, 78, 0.1); color: var(--error); }
  .msg.success { background: rgba(90, 140, 90, 0.1); color: var(--success); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <svg class="brand-mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="50" rx="46" ry="46" fill="none" stroke="#B8965A" stroke-width="3"/>
      <circle cx="50" cy="50" r="6" fill="#B8965A"/>
      <path d="M50 18 L50 38 M50 62 L50 82 M18 50 L38 50 M62 50 L82 50" stroke="#B8965A" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <div>
      <div class="brand-text">Nexa</div>
      <div class="brand-sub">Platform CRM</div>
    </div>
  </div>
  <a class="nav-link" id="backLink" onclick="window.location.href='dashboard.html'">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Retour au tableau de bord
  </a>
</div>

<div class="page">
  <div class="card">
    <div id="forceNotice" style="display:none;background:rgba(184,150,90,0.12);border:1px solid rgba(184,150,90,0.35);border-radius:10px;padding:14px 16px;margin-bottom:20px;font-size:13px;color:#8B6E3A">
      🔒 Pour votre sécurité, vous devez définir votre propre mot de passe avant de continuer. Votre administrateur ne connaîtra plus ce nouveau mot de passe.
    </div>
    <div class="eyebrow">Sécurité</div>
    <h1>Changer mon mot de passe</h1>

    <form id="pwdForm">
      <div class="field">
        <label>Mot de passe actuel</label>
        <div class="pwd-wrap">
          <input type="password" id="oldPassword" placeholder="••••••••" required>
          <button type="button" class="pwd-eye" onclick="togglePwd('oldPassword', this)" aria-label="Afficher le mot de passe">
            <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <div class="field">
        <label>Nouveau mot de passe</label>
        <div class="pwd-wrap">
          <input type="password" id="newPassword" placeholder="••••••••" required>
          <button type="button" class="pwd-eye" onclick="togglePwd('newPassword', this)" aria-label="Afficher le mot de passe">
            <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <div class="field">
        <label>Confirmer le nouveau mot de passe</label>
        <div class="pwd-wrap">
          <input type="password" id="confirmPassword" placeholder="••••••••" required>
          <button type="button" class="pwd-eye" onclick="togglePwd('confirmPassword', this)" aria-label="Afficher le mot de passe">
            <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Mettre à jour</button>
      <div class="msg" id="msgBox"></div>
    </form>
  </div>
</div>

<script>
  function togglePwd(inputId, btn) {
    const input = document.getElementById(inputId);
    const open = btn.querySelector('.eye-open');
    const closed = btn.querySelector('.eye-closed');
    if (input.type === 'password') {
      input.type = 'text';
      open.style.display = 'none';
      closed.style.display = 'block';
    } else {
      input.type = 'password';
      open.style.display = 'block';
      closed.style.display = 'none';
    }
  }

  const CRM_CHANGE_PWD = 'https://n8n.srv936251.hstgr.cloud/webhook/crm-change-password';
  const SESSION_KEY = 'crm_session_user';
  const SESSION_EXPIRY = 'crm_session_expiry';

  function getSession() {
    try {
      const raw = localStorage.getItem(SESSION_KEY);
      const expiry = parseInt(localStorage.getItem(SESSION_EXPIRY) || '0');
      if (!raw || Date.now() >= expiry) return null;
      return JSON.parse(raw);
    } catch (e) { return null; }
  }

  const session = getSession();
  if (!session) {
    window.location.href = 'index.html';
    throw new Error('No session');
  }

  const isForced = localStorage.getItem('crm_force_pwd_change') === '1';
  if (isForced) {
    document.getElementById('forceNotice').style.display = 'block';
    document.getElementById('backLink').style.display = 'none';
  }

  const form = document.getElementById('pwdForm');
  const btn = document.getElementById('submitBtn');
  const msgBox = document.getElementById('msgBox');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    const oldPassword = document.getElementById('oldPassword').value.trim();
    const newPassword = document.getElementById('newPassword').value.trim();
    const confirmPassword = document.getElementById('confirmPassword').value.trim();

    msgBox.style.display = 'none';

    if (newPassword.length < 6) {
      msgBox.className = 'msg error';
      msgBox.textContent = 'Le nouveau mot de passe doit contenir au moins 6 caractères.';
      msgBox.style.display = 'block';
      return;
    }
    if (newPassword !== confirmPassword) {
      msgBox.className = 'msg error';
      msgBox.textContent = 'Les mots de passe ne correspondent pas.';
      msgBox.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Mise à jour…';

    try {
      const resp = await fetch(CRM_CHANGE_PWD, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ login: session.login, old_password: oldPassword, new_password: newPassword })
      });
      const data = await resp.json();

      if (data.success) {
        msgBox.className = 'msg success';
        msgBox.textContent = '✅ ' + data.message;
        msgBox.style.display = 'block';
        form.reset();
        if (isForced) {
          localStorage.removeItem('crm_force_pwd_change');
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
        }
      } else {
        msgBox.className = 'msg error';
        msgBox.textContent = data.message || 'Une erreur est survenue.';
        msgBox.style.display = 'block';
      }
    } catch (err) {
      msgBox.className = 'msg error';
      msgBox.textContent = 'Connexion impossible. Réessayez.';
      msgBox.style.display = 'block';
    }

    btn.disabled = false;
    btn.textContent = 'Mettre à jour';
  });
</script>

</body>
</html>
