<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon CRM - Funnels</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f8; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; font-size: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        th { color: #666; font-weight: normal; }
        .btn { background: #6c47ff; color: white; border: none; padding: 8px 12px; border-radius: 4px; float: right; cursor: pointer; }
        .empty { text-align: center; color: #999; padding: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mes Funnels <button class="btn">+ Nouveau</button></h1>
        <table>
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Dernière mise à jour</th>
                    <th>Étapes</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="4" class="empty">Aucune donnée pour le moment...</td></tr>
            </tbody>
        </table>
    </div>
</body>
</html>
