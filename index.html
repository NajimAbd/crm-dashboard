<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa — Connexion</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --green-deep: #0D1A12;
    --green-mid: #16261A;
    --gold: #B8965A;
    --gold-light: #D4AF7A;
    --cream: #F4ECE0;
    --text-soft: #9CA89E;
    --error: #E0685A;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 20% 20%, var(--green-mid) 0%, var(--green-deep) 55%);
    font-family: 'Inter', sans-serif;
    color: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  /* Motif décoratif discret évoquant une géométrie islamique simplifiée */
  .bg-pattern {
    position: fixed;
    inset: 0;
    opacity: 0.05;
    background-image:
      repeating-linear-gradient(45deg, var(--gold) 0, var(--gold) 1px, transparent 1px, transparent 60px),
      repeating-linear-gradient(-45deg, var(--gold) 0, var(--gold) 1px, transparent 1px, transparent 60px);
    pointer-events: none;
  }

  .login-card {
    position: relative;
    width: 100%;
    max-width: 400px;
    background: linear-gradient(160deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border: 1px solid rgba(184, 150, 90, 0.25);
    border-radius: 18px;
    padding: 48px 38px 40px;
    backdrop-filter: blur(6px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    animation: rise 0.7s ease-out;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .mark {
    width: 52px;
    height: 52px;
    margin: 0 auto 22px;
    display: block;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 30px;
    letter-spacing: 0.01em;
    text-align: center;
    margin: 0 0 4px;
    color: var(--cream);
  }

  .eyebrow {
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 28px;
    font-weight: 600;
  }

  label {
    display: block;
    font-size: 12px;
    color: var(--text-soft);
    margin-bottom: 7px;
    letter-spacing: 0.02em;
  }

  .field { margin-bottom: 18px; }

  input {
    width: 100%;
    padding: 13px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(184, 150, 90, 0.3);
    border-radius: 10px;
    color: var(--cream);
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  input::placeholder { color: rgba(156, 168, 158, 0.5); }

  input:focus {
    border-color: var(--gold);
    background: rgba(255,255,255,0.06);
  }

  .submit-btn {
    width: 100%;
    margin-top: 10px;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--green-deep);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    font-family: 'Inter', sans-serif;
  }

  .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(184,150,90,0.3); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: 0.6; cursor: wait; transform: none; }

  .error-msg {
    display: none;
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(224, 104, 90, 0.12);
    border: 1px solid rgba(224, 104, 90, 0.35);
    border-radius: 8px;
    color: var(--error);
    font-size: 13px;
    text-align: center;
  }

  .footer-note {
    text-align: center;
    margin-top: 28px;
    font-size: 11px;
    color: rgba(156, 168, 158, 0.6);
    letter-spacing: 0.03em;
  }

  @media (prefers-reduced-motion: reduce) {
    .login-card { animation: none; }
  }
</style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="login-card">
  <svg class="mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="50" cy="50" rx="46" ry="46" fill="none" stroke="#B8965A" stroke-width="3"/>
    <circle cx="50" cy="50" r="6" fill="#B8965A"/>
    <path d="M50 18 L50 38 M50 62 L50 82 M18 50 L38 50 M62 50 L82 50" stroke="#B8965A" stroke-width="2.5" stroke-linecap="round"/>
  </svg>

  <h1>Nexa</h1>
  <p class="eyebrow">Platform CRM</p>

  <form id="loginForm" autocomplete="on">
    <div class="field">
      <label for="login">Login</label>
      <input type="text" id="login" name="login" placeholder="votre@email.com" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="submit-btn" id="submitBtn">Se connecter</button>
    <div class="error-msg" id="errorMsg">Identifiant ou mot de passe incorrect</div>
  </form>

  <a onclick="window.location.href='register.html'" style="display:block;text-align:center;margin-top:18px;font-size:13px;color:#D4AF7A;text-decoration:none;cursor:pointer">Nouveau client — créer un compte</a>

  <p class="footer-note">Platform CRM</p>
</div>

<script>
  const CRM_LOGIN_WEBHOOK = 'https://n8n.srv936251.hstgr.cloud/webhook/crm-login';
  const SESSION_KEY = 'crm_session_user';
  const SESSION_EXPIRY = 'crm_session_expiry';
  const SESSION_DURATION = 8 * 60 * 60 * 1000; // 8 heures

  function isSessionValid() {
    const user = localStorage.getItem(SESSION_KEY);
    const expiry = parseInt(localStorage.getItem(SESSION_EXPIRY) || '0');
    return user && Date.now() < expiry;
  }

  // Si déjà connecté, redirige directement vers le tableau de bord
  if (isSessionValid()) {
    window.location.href = 'dashboard.html';
  }

  const form = document.getElementById('loginForm');
  const btn = document.getElementById('submitBtn');
  const errorMsg = document.getElementById('errorMsg');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    const login = document.getElementById('login').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!login || !password) return;

    btn.disabled = true;
    btn.textContent = 'Connexion…';
    errorMsg.style.display = 'none';

    try {
      const resp = await fetch(CRM_LOGIN_WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ login, password })
      });
      const data = await resp.json();

      if (data.success) {
        const session = {
          login: data.login,
          role: data.role,
          account_id: data.account_id,
          nom_praticien: data.nom_praticien
        };
        localStorage.setItem(SESSION_KEY, JSON.stringify(session));
        localStorage.setItem(SESSION_EXPIRY, Date.now() + SESSION_DURATION);
        if (data.must_change_password) {
          localStorage.setItem('crm_force_pwd_change', '1');
          window.location.href = 'change-password.html';
        } else {
          window.location.href = 'dashboard.html';
        }
      } else {
        errorMsg.style.display = 'block';
      }
    } catch (err) {
      errorMsg.textContent = 'Connexion impossible. Réessayez.';
      errorMsg.style.display = 'block';
    }

    btn.disabled = false;
    btn.textContent = 'Se connecter';
  });
</script>

</body>
</html>
