<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa — Mot de passe oublié</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --green-deep: #0D1A12;
    --green-mid: #16261A;
    --gold: #B8965A;
    --gold-light: #D4AF7A;
    --cream: #F4ECE0;
    --text-soft: #9CA89E;
    --error: #E0685A;
    --success: #5A8C5A;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 20% 20%, var(--green-mid) 0%, var(--green-deep) 55%);
    font-family: 'Inter', sans-serif;
    color: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%; max-width: 400px;
    background: linear-gradient(160deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border: 1px solid rgba(184, 150, 90, 0.25);
    border-radius: 18px;
    padding: 44px 38px 36px;
    backdrop-filter: blur(6px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }

  .mark { width: 48px; height: 48px; margin: 0 auto 18px; display: block; }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600; font-size: 24px;
    text-align: center; margin: 0 0 6px; color: var(--cream);
  }
  .eyebrow {
    text-align: center; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--gold); margin: 0 0 12px; font-weight: 600;
  }
  .desc {
    text-align: center; font-size: 13px; color: var(--text-soft); margin: 0 0 24px; line-height: 1.5;
  }

  label { display: block; font-size: 12px; color: var(--text-soft); margin-bottom: 7px; }
  .field { margin-bottom: 16px; }

  input {
    width: 100%; padding: 13px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(184, 150, 90, 0.3);
    border-radius: 10px; color: var(--cream); font-size: 15px;
    font-family: 'Inter', sans-serif; outline: none;
  }
  input:focus { border-color: var(--gold); background: rgba(255,255,255,0.06); }

  .submit-btn {
    width: 100%; margin-top: 8px; padding: 14px;
    border: none; border-radius: 10px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--green-deep); font-size: 15px; font-weight: 600; cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .submit-btn:disabled { opacity: 0.6; cursor: wait; }

  .msg {
    display: none; margin-top: 14px; padding: 12px 14px;
    border-radius: 8px; font-size: 13px; text-align: center; line-height: 1.5;
  }
  .msg.success { background: rgba(90, 140, 90, 0.12); border: 1px solid rgba(90, 140, 90, 0.35); color: var(--success); }

  .back-link {
    display: block; text-align: center; margin-top: 22px;
    font-size: 13px; color: var(--gold-light); text-decoration: none; cursor: pointer;
  }
  .back-link:hover { color: var(--cream); }
</style>
</head>
<body>

<div class="card">
  <svg class="mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="50" cy="50" rx="46" ry="46" fill="none" stroke="#B8965A" stroke-width="3"/>
    <circle cx="50" cy="50" r="6" fill="#B8965A"/>
    <path d="M50 18 L50 38 M50 62 L50 82 M18 50 L38 50 M62 50 L82 50" stroke="#B8965A" stroke-width="2.5" stroke-linecap="round"/>
  </svg>

  <h1>Mot de passe oublié</h1>
  <p class="eyebrow">Nexa Platform CRM</p>
  <p class="desc">Entrez votre login. Si un compte existe, vous recevrez un lien pour choisir un nouveau mot de passe.</p>

  <form id="forgotForm">
    <div class="field">
      <label for="login">Login</label>
      <input type="text" id="login" placeholder="votre@email.com" required>
    </div>
    <button type="submit" class="submit-btn" id="submitBtn">Envoyer le lien</button>
    <div class="msg success" id="successMsg"></div>
  </form>

  <a class="back-link" onclick="window.location.href='index.html'">← Retour à la connexion</a>
</div>

<script>
  const CRM_FORGOT_WEBHOOK = 'https://n8n.srv936251.hstgr.cloud/webhook/crm-forgot-password';

  const form = document.getElementById('forgotForm');
  const btn = document.getElementById('submitBtn');
  const successMsg = document.getElementById('successMsg');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    const login = document.getElementById('login').value.trim();
    if (!login) return;

    btn.disabled = true;
    btn.textContent = 'Envoi…';
    successMsg.style.display = 'none';

    try {
      const resp = await fetch(CRM_FORGOT_WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ login })
      });
      const data = await resp.json();
      successMsg.textContent = '✅ ' + data.message;
      successMsg.style.display = 'block';
      form.reset();
    } catch (err) {
      successMsg.textContent = '✅ Si un compte existe, un lien a été envoyé.';
      successMsg.style.display = 'block';
    }

    btn.disabled = false;
    btn.textContent = 'Envoyer le lien';
  });
</script>

</body>
</html>
