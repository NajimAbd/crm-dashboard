<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa — Détail du lead</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --green-deep: #0D1A12;
    --gold: #B8965A;
    --gold-light: #D4AF7A;
    --cream: #F4ECE0;
    --bg-soft: #FAF7F1;
    --text-main: #2C2C2A;
    --text-soft: #6B6B68;
    --border-soft: #E5DECF;
    --status-paid: #5A8C5A;
    --status-cold: #9C9C9C;
    --status-error: #C4604E;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg-soft);
    font-family: 'Inter', sans-serif;
    color: var(--text-main);
    min-height: 100vh;
  }

  .topbar {
    background: var(--green-deep);
    color: var(--cream);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--gold);
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .brand-mark { width: 34px; height: 34px; }
  .brand-text {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600; font-size: 22px; color: var(--cream);
  }
  .brand-sub {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--gold); margin-top: 2px;
  }
  .back-link {
    display: flex; align-items: center; gap: 6px;
    color: var(--gold-light); text-decoration: none;
    font-size: 13px; cursor: pointer;
  }
  .back-link:hover { color: var(--cream); }

  .page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 32px 60px;
  }

  .lead-header {
    background: white;
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 28px 32px;
    margin-bottom: 24px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
  }
  .lead-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 600;
    color: var(--green-deep);
    margin: 0 0 6px;
  }
  .lead-contact { color: var(--text-soft); font-size: 14px; line-height: 1.6; }
  .lead-contact span { display: inline-block; margin-right: 16px; }

  .status-chip {
    display: inline-block;
    padding: 5px 14px;
    border-radius: 14px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .status-buyer { background: rgba(90, 140, 90, 0.15); color: var(--status-paid); }
  .status-prospect { background: rgba(156, 156, 156, 0.15); color: var(--status-cold); }
  .status-diagnosed { background: rgba(184, 150, 90, 0.18); color: var(--gold); }

  .source-tags { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
  .tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 10px;
    background: rgba(184, 150, 90, 0.12);
    color: #8B6E3A;
  }

  /* Sections */
  /* ==== BADGES V1 (type, VIP, température, Ayrika) ==== */
  .type-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .5px;
    background: rgba(184,150,90,.14);
    color: #8A6D38;
    border: 1px solid rgba(184,150,90,.35);
    vertical-align: middle;
  }
  .header-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 11px;
    border-radius: 14px;
    font-size: 12px;
    font-weight: 600;
    background: white;
    border: 1px solid var(--border-soft);
    color: var(--text-main);
  }
  .ayrika-block {
    background: #FAF7F1;
    border: 1px solid var(--border-soft);
    border-left: 3px solid var(--gold);
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 10px;
    font-size: 13px;
    line-height: 1.55;
  }
  .ayrika-block .ayrika-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .6px;
    text-transform: uppercase;
    color: #8A6D38;
    margin-bottom: 5px;
  }

  .section {
    background: white;
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .section-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 24px;
    background: #F4EFE3;
    border-bottom: 1px solid var(--border-soft);
  }
  .section-head svg { color: var(--gold); flex-shrink: 0; }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    font-weight: 600;
    color: var(--green-deep);
    margin: 0;
  }
  .section-count {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-soft);
    background: rgba(0,0,0,0.04);
    padding: 2px 10px;
    border-radius: 10px;
  }
  .section-body { padding: 18px 24px; }
  .empty-row { color: var(--text-soft); font-size: 13px; font-style: italic; }

  /* Diagnostic */
  .diag-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px; }
  .diag-item { font-size: 13px; }
  .diag-label { color: var(--text-soft); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .diag-value { color: var(--text-main); line-height: 1.5; }
  .score-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px; height: 34px;
    border-radius: 50%;
    font-weight: 700;
    font-size: 14px;
    color: white;
  }

  /* Timeline items (sales, calls, appointments, emails) */
  .timeline-item {
    display: flex;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border-soft);
  }
  .timeline-item:last-child { border-bottom: none; }
  .timeline-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(184, 150, 90, 0.12);
    display: flex; align-items: center; justify-content: center;
    color: var(--gold);
    flex-shrink: 0;
  }
  .timeline-content { flex: 1; }
  .timeline-title { font-weight: 600; font-size: 13px; color: var(--text-main); }
  .timeline-meta { font-size: 12px; color: var(--text-soft); margin-top: 2px; }
  .timeline-amount { font-weight: 700; color: var(--status-paid); font-size: 14px; }

  /* Analyse IA */
  .ai-block { background: #FBF9F4; border-radius: 10px; padding: 16px 18px; margin-bottom: 12px; }
  .ai-block:last-child { margin-bottom: 0; }
  .ai-row { display: flex; gap: 10px; margin-bottom: 8px; font-size: 13px; }
  .ai-row:last-child { margin-bottom: 0; }
  .ai-tag-good { color: var(--status-paid); }
  .ai-tag-bad { color: var(--status-error); }

  .loading-state {
    text-align: center;
    padding: 100px 24px;
    color: var(--text-soft);
  }
  .spinner {
    width: 28px; height: 28px;
    border: 2.5px solid var(--border-soft);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    .page { padding: 20px 16px 50px; }
    .lead-header { padding: 20px; }
    .diag-grid { grid-template-columns: 1fr; }
  }

  /* ==== Synthèse Ayrika V2 : Expertise du Terrain / Équipe Experts IA ==== */
  .ayrika-v2-header {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px;
    border-radius: 10px;
    font-weight: 700; font-size: 14px;
    background: var(--gold); color: var(--green-deep);
    margin: 14px 0 10px;
  }
  .ayrika-v2-body {
    font-size: 13.5px; line-height: 1.65; color: var(--text-main);
    padding: 4px 4px 6px;
  }
  .ayrika-v2-subbtn {
    display: inline-block;
    padding: 8px 14px;
    border-radius: 8px;
    font-weight: 700; font-size: 12.5px;
    background: #F2E9D2; color: #8A6D38;
    border: 1px solid rgba(184,150,90,.4);
    margin: 10px 8px 6px 0;
  }
  .ayrika-v2-subbody {
    background: #FBF9F4;
    border: 1px solid var(--border-soft);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 14px;
    font-size: 13px; line-height: 1.6;
  }
  .ayrika-v2-alert {
    background: #FBEFEB; border: 1px solid #E0B0A5; color: #A33F2E;
    border-radius: 8px; padding: 10px 14px; margin: 10px 0; font-size: 13px; font-weight: 600;
  }

  @media print {
    .topbar, .back-link, button, select, input[type="checkbox"] { display: none !important; }
    body { background: white; }
    .section { border: none; box-shadow: none; }
    .page { padding: 0; max-width: 100%; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <svg class="brand-mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="50" rx="46" ry="46" fill="none" stroke="#B8965A" stroke-width="3"/>
      <circle cx="50" cy="50" r="6" fill="#B8965A"/>
      <path d="M50 18 L50 38 M50 62 L50 82 M18 50 L38 50 M62 50 L82 50" stroke="#B8965A" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <div>
      <div class="brand-text">Nexa</div>
      <div class="brand-sub">Platform CRM</div>
    </div>
  </div>
  <a class="back-link" onclick="window.location.href='dashboard.html'">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Retour au tableau de bord
  </a>
</div>

<div class="page" id="pageContent">
  <div class="loading-state">
    <div class="spinner"></div>
    <div>Chargement du dossier…</div>
  </div>
</div>

<script>
  const CRM_DETAIL_API = 'https://n8n.srv936251.hstgr.cloud/webhook/crm-lead-detail';
  const SESSION_KEY = 'crm_session_user';
  const SESSION_EXPIRY = 'crm_session_expiry';

  function getSession() {
    try {
      const raw = localStorage.getItem(SESSION_KEY);
      const expiry = parseInt(localStorage.getItem(SESSION_EXPIRY) || '0');
      if (!raw || Date.now() >= expiry) return null;
      return JSON.parse(raw);
    } catch (e) { return null; }
  }

  const session = getSession();
  if (!session) {
    window.location.href = 'index.html';
    throw new Error('No session');
  }

  const params = new URLSearchParams(window.location.search);
  const leadId = params.get('id');

  if (!leadId) {
    document.getElementById('pageContent').innerHTML = '<div class="loading-state">Aucun lead spécifié.</div>';
  } else {
    loadLeadDetail();
  }

  function esc(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function fmtDate(d) {
    if (!d) return '—';
    return new Date(d.replace(' ', 'T')).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
  }
  function fmtDateTime(d) {
    if (!d) return '—';
    return new Date(d.replace(' ', 'T')).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function scoreColor(score) {
    if (score >= 80) return '#5A8C5A';
    if (score >= 50) return '#C49A4E';
    return '#9C9C9C';
  }

  // Affiche joliment la Synthèse Ayrika.
  // Détecte automatiquement le format : V2 (expertise_terrain / equipe_experts_ia)
  // ou ancien format (hypotheses_en_presence / 9-12 couches) pour les diagnostics déjà en base.
  // Nettoie les caractères de contrôle non échappés qui cassent JSON.parse
  // (Ayrika peut produire des \n, \t ou caractères invisibles à l'intérieur des chaînes JSON)
  function sanitizeJsonString(s) {
    let out = '';
    let inString = false;
    let escaped = false;
    for (let i = 0; i < s.length; i++) {
      const ch = s[i];
      const code = s.charCodeAt(i);
      if (escaped) { out += ch; escaped = false; continue; }
      if (ch === '\\') { out += ch; escaped = true; continue; }
      if (ch === '"') { inString = !inString; out += ch; continue; }
      if (inString && code < 0x20) {
        if (code === 10) out += '\\n';
        else if (code === 13) out += '\\r';
        else if (code === 9)  out += '\\t';
        // autres caractères de contrôle : supprimés
        continue;
      }
      out += ch;
    }
    return out;
  }

  function renderAyrika(raw) {
    let a;
    try { a = (typeof raw === 'object') ? raw : JSON.parse(raw); }
    catch (e1) {
      try { a = JSON.parse(sanitizeJsonString(String(raw))); }
      catch (e2) {
        return '<div class="ayrika-block" style="border-left-color:#5A8C5A"><div class="ayrika-title" style="color:#3E6B3E">✨ Synthèse Ayrika</div>' + esc(raw) + '</div>';
      }
    }

    // Ancien format d'alerte pure (tableau de signaux) — compat rétro
    if (Array.isArray(a) || (a && a.signaux && !a.hypotheses_en_presence && !a.expertise_terrain)) {
      let sig = Array.isArray(a) ? a : (a.signaux || []);
      let flat = [];
      sig.forEach(function(s){ const it = Array.isArray(s.signaux) ? s.signaux : [s]; it.forEach(function(x){ flat.push(typeof x==='string'?x:(x.signaux||'')); }); });
      const uniq = [...new Set(flat.map(x=>String(x)))];
      let hh = '<div class="ayrika-block" style="border-left-color:#C4604E;background:#FBEFEB"><div class="ayrika-title" style="color:#A33F2E">⚠ Synthèse Ayrika — ALERTE</div>';
      hh += '<ul style="margin:6px 0 0;padding-left:18px;font-size:12.5px;color:#7A2E1F">';
      uniq.forEach(function(x){ hh += '<li>' + esc(x) + '</li>'; });
      hh += '</ul></div>';
      return hh;
    }

    if (a && a.expertise_terrain) return renderAyrikaV2(a);
    return renderAyrikaLegacy(a);
  }

  function listBlock(title, arr, color) {
    if (!Array.isArray(arr) || !arr.length) return '';
    let s = '<div style="font-weight:600;font-size:12.5px;color:' + color + ';margin:10px 0 5px">' + title + '</div>';
    s += '<ul style="margin:0;padding:0 0 0 18px;font-size:12.5px;line-height:1.5;color:#4A4A47">';
    arr.forEach(x => { s += '<li style="margin-bottom:3px">' + esc(x) + '</li>'; });
    s += '</ul>';
    return s;
  }

  // ==== Nouveau format V2 : Expertise du Terrain + Équipe Experts IA (+ 3 sous-analyses) ====
  function renderAyrikaV2(a) {
    let h = '<div class="ayrika-block" style="border-left-color:#5A8C5A">';
    h += '<div class="ayrika-title" style="color:#3E6B3E">✨ Synthèse Ayrika</div>';

    // Alertes en tête — l'analyse continue toujours en dessous
    const alertes = Array.isArray(a.alertes) ? a.alertes : [];
    if (a.a_des_alertes || alertes.length) {
      h += '<div class="ayrika-v2-alert">⚠ ALERTES — orientation professionnelle prioritaire';
      if (alertes.length) {
        h += '<ul style="margin:6px 0 0;padding-left:18px;font-weight:400">';
        alertes.forEach(al => { h += '<li style="margin-bottom:2px">' + esc(al) + '</li>'; });
        h += '</ul>';
      }
      h += '</div>';
    }

    // ---- 1. Expertise du Terrain ----
    const terrain = a.expertise_terrain || {};
    h += '<div class="ayrika-v2-header">🕌 Expertise du Terrain</div>';
    h += '<div class="ayrika-v2-body">';
    if (terrain.resume) h += '<div style="margin-bottom:10px">' + esc(terrain.resume) + '</div>';
    if (Array.isArray(terrain.signes_identifies) && terrain.signes_identifies.length) {
      h += '<div style="font-weight:600;font-size:12.5px;color:#8A6D38;margin:8px 0 5px">Signes identifiés</div>';
      h += '<ul style="margin:0;padding-left:18px">';
      terrain.signes_identifies.forEach(s => {
        h += '<li style="margin-bottom:4px"><b>' + esc(s.signe || '') + '</b>' +
             (s.correspondance_grille ? ' — correspondance ' + esc(s.correspondance_grille) : '') +
             (s.explication ? '<br><span style="color:#6B6B68">' + esc(s.explication) + '</span>' : '') + '</li>';
      });
      h += '</ul>';
    }
    h += listBlock('Éléments clés', terrain.elements_cles, '#8A6D38');
    h += '</div>';

    // ---- 2. Équipe Experts IA ----
    const equipe = a.equipe_experts_ia || {};
    const synth = equipe.synthese || {};
    h += '<div class="ayrika-v2-header">🧠 Équipe Experts IA</div>';
    h += '<div class="ayrika-v2-body">';
    if (synth.synthese) h += '<div style="margin-bottom:10px">' + esc(synth.synthese) + '</div>';
    h += listBlock('✓ Éléments convergents', synth.elements_convergents, '#3E6B3E');
    h += listBlock('⟷ Éléments divergents (à clarifier)', synth.elements_divergents, '#B8860B');

    // Détail des 7 experts (repliable)
    if (Array.isArray(equipe.experts) && equipe.experts.length) {
      h += '<details style="margin-top:10px"><summary style="cursor:pointer;font-weight:600;font-size:12.5px;color:#8A6D38">Voir le détail des 7 experts</summary>';
      equipe.experts.forEach(ex => {
        h += '<div style="margin:8px 0;padding:8px 10px;background:#FAF7F1;border-radius:6px">';
        h += '<div style="font-weight:600;font-size:12.5px;color:#2C2C2A">' + esc(ex.expert || '—') + '</div>';
        if (ex.resume) h += '<div style="font-size:12.5px;color:#4A4A47;margin-top:3px">' + esc(ex.resume) + '</div>';
        h += '</div>';
      });
      h += '</details>';
    }
    h += '</div>';

    h += '<hr style="border:none;border-top:1px solid var(--border-soft);margin:14px 0">';

    // ---- 3 sous-boutons : Douleurs / Besoin Ardon / Mots ----
    const uid = 'ayrika_' + Math.random().toString(36).slice(2, 9);

    // A. Douleurs Identifiées
    const douleurs = a.douleurs_identifiees || {};
    h += '<span class="ayrika-v2-subbtn" onclick="var e=document.getElementById(\'' + uid + '_douleurs\'); e.style.display = e.style.display===\'none\'?\'block\':\'none\';">💥 Douleurs identifiées</span>';
    h += '<div id="' + uid + '_douleurs" class="ayrika-v2-subbody" style="display:none">';
    if (douleurs.synthese) h += '<div style="margin-bottom:8px">' + esc(douleurs.synthese) + '</div>';
    if (Array.isArray(douleurs.douleurs) && douleurs.douleurs.length) {
      douleurs.douleurs.forEach(d => {
        h += '<div style="margin-bottom:10px;padding:8px 10px;background:#F7F1E6;border-radius:6px">';
        h += '<div style="font-weight:600;color:#8A5A00">' + esc(d.douleur || '') + '</div>';
        if (d.classification_maslow) h += '<div style="margin-top:3px"><b>Maslow :</b> ' + esc(d.classification_maslow) + '</div>';
        if (d.classification_autre_ecole) h += '<div><b>Autre école :</b> ' + esc(d.classification_autre_ecole) + '</div>';
        if (d.propagation_possible) h += '<div><b>Propagation possible :</b> ' + esc(d.propagation_possible) + '</div>';
        if (d.evolution_si_non_traite) h += '<div><b>Évolution si non traité :</b> ' + esc(d.evolution_si_non_traite) + '</div>';
        h += '</div>';
      });
    }
    h += '</div>';

    // B. Besoin Ardon
    const ardon = a.besoin_ardon || {};
    h += '<span class="ayrika-v2-subbtn" onclick="var e=document.getElementById(\'' + uid + '_ardon\'); e.style.display = e.style.display===\'none\'?\'block\':\'none\';">🎯 Besoin Ardon (recherche par lead)</span>';
    h += '<div id="' + uid + '_ardon" class="ayrika-v2-subbody" style="display:none">';
    if (ardon.besoin_principal) h += '<div style="margin-bottom:6px"><b>Besoin principal :</b> ' + esc(ardon.besoin_principal) + '</div>';
    h += listBlock('Besoins secondaires', ardon.besoins_secondaires, '#8A6D38');
    if (ardon.transformation_recherchee) h += '<div style="margin:6px 0"><b>Transformation recherchée :</b> ' + esc(ardon.transformation_recherchee) + '</div>';
    if (ardon.message_qui_resonnerait) h += '<div style="margin:6px 0"><b>Message qui résonnerait :</b> ' + esc(ardon.message_qui_resonnerait) + '</div>';
    if (Array.isArray(ardon.tableau_analyse) && ardon.tableau_analyse.length) {
      h += '<table style="width:100%;border-collapse:collapse;margin-top:8px;font-size:12px">';
      h += '<tr style="text-align:left;color:#8A6D38"><th style="padding:4px">Élément</th><th style="padding:4px">Observation</th><th style="padding:4px">Besoin potentiel</th><th style="padding:4px">Confiance</th></tr>';
      ardon.tableau_analyse.forEach(row => {
        h += '<tr style="border-top:1px solid var(--border-soft)"><td style="padding:4px">' + esc(row.element_analyse) + '</td><td style="padding:4px">' + esc(row.observation_discours) + '</td><td style="padding:4px">' + esc(row.besoin_potentiel) + '</td><td style="padding:4px">' + esc(row.niveau_confiance) + '%</td></tr>';
      });
      h += '</table>';
    }
    h += listBlock('Points à approfondir', ardon.points_a_approfondir, '#8A6D38');
    h += '</div>';

    // C. Identification des Mots
    const mots = a.identification_mots || {};
    h += '<span class="ayrika-v2-subbtn" onclick="var e=document.getElementById(\'' + uid + '_mots\'); e.style.display = e.style.display===\'none\'?\'block\':\'none\';">💬 Identification des mots</span>';
    h += '<div id="' + uid + '_mots" class="ayrika-v2-subbody" style="display:none">';
    if (Array.isArray(mots.mots_phrases_cles) && mots.mots_phrases_cles.length) {
      mots.mots_phrases_cles.forEach(m => {
        h += '<div style="margin-bottom:8px"><b>« ' + esc(m.mot_ou_phrase) + ' »</b><br><span style="color:#6B6B68">' + esc(m.pourquoi_ca_resonne) + '</span></div>';
      });
    }
    if (mots.message_type_suggere) h += '<div style="margin-top:8px;padding:8px 10px;background:#F7F1E6;border-radius:6px"><b>Message suggéré :</b> ' + esc(mots.message_type_suggere) + '</div>';
    h += '</div>';

    h += '</div>';
    return h;
  }

  // ==== Ancien format (hypotheses_en_presence / 9-12 couches) — conservé pour les diagnostics déjà en base ====
  function renderAyrikaLegacy(a) {
    let h = '<div class="ayrika-block" style="border-left-color:#5A8C5A">';
    h += '<div class="ayrika-title" style="color:#3E6B3E">✨ Synthèse Ayrika</div>';

    const alertes = Array.isArray(a.alertes) ? a.alertes : [];
    if (a.a_des_alertes || alertes.length) {
      h += '<div style="background:#FBEFEB;border:1px solid #E0B0A5;border-radius:8px;padding:10px 12px;margin-bottom:14px">';
      h += '<div style="font-weight:700;color:#A33F2E;font-size:13px;margin-bottom:6px">⚠ ALERTES — orientation professionnelle prioritaire</div>';
      if (alertes.length) {
        h += '<ul style="margin:0;padding-left:18px;font-size:12.5px;color:#7A2E1F">';
        alertes.forEach(function(al){ h += '<li style="margin-bottom:2px">' + esc(al) + '</li>'; });
        h += '</ul>';
      }
      h += '</div>';
    }

    const statutMap = {
      'a_valider_par_praticien': { txt: 'À valider par le praticien', bg: '#C49A4E' },
      'hypothese_retenue': { txt: 'Hypothèse retenue', bg: '#5A8C5A' }
    };
    const st = statutMap[a.statut] || { txt: esc(a.statut || '—'), bg: '#9C9C9C' };
    h += '<div style="display:inline-block;padding:5px 12px;border-radius:20px;background:' + st.bg + ';color:#fff;font-size:12px;font-weight:600;margin-bottom:12px">' + st.txt + '</div>';

    if (a.synthese) {
      h += '<div style="margin-bottom:14px;font-size:13.5px;line-height:1.6;color:#2C2C2A;background:#F7F4EE;padding:12px 14px;border-radius:8px">' + esc(a.synthese) + '</div>';
    }

    if (Array.isArray(a.hypotheses_en_presence) && a.hypotheses_en_presence.length) {
      h += '<div style="font-weight:600;font-size:13px;color:#3E6B3E;margin:10px 0 8px">Hypothèses en présence</div>';
      const hyps = a.hypotheses_en_presence.slice().sort((x, y) => (y.score || 0) - (x.score || 0));
      hyps.forEach((hyp, i) => {
        const sc = hyp.score || 0;
        const scColor = sc >= 70 ? '#5A8C5A' : (sc >= 55 ? '#C49A4E' : '#9C9C9C');
        h += '<div style="margin-bottom:10px;border:1px solid #E5DECF;border-radius:8px;overflow:hidden">';
        h += '<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:#FAF7F1">';
        h += '<div style="min-width:38px;height:38px;border-radius:8px;background:' + scColor + ';color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px">' + sc + '</div>';
        h += '<div style="font-weight:600;font-size:13px;color:#2C2C2A">' + (i === 0 ? '★ ' : '') + esc(hyp.type || '—') + '</div>';
        h += '</div>';
        if (Array.isArray(hyp.arguments_cles) && hyp.arguments_cles.length) {
          h += '<ul style="margin:0;padding:8px 12px 10px 28px;font-size:12.5px;line-height:1.5;color:#4A4A47">';
          hyp.arguments_cles.forEach(arg => { h += '<li style="margin-bottom:3px">' + esc(arg) + '</li>'; });
          h += '</ul>';
        }
        h += '</div>';
      });
    }

    if (a.recommandation_professionnelle) {
      h += '<div style="margin:10px 0;padding:8px 12px;border-radius:8px;background:#FBEFEB;border:1px solid #E0B0A5;color:#A33F2E;font-size:12.5px;font-weight:600">⚕ Recommandation : consultation professionnelle conseillée</div>';
    }

    if ((Array.isArray(a.douleurs) && a.douleurs.length) || (Array.isArray(a.causes_profondes) && a.causes_profondes.length)) {
      h += '<div style="background:#F7F1E6;border:1px solid #E5D5B5;border-radius:8px;padding:11px 13px;margin:12px 0">';
      h += listBlock('💥 Douleurs identifiées', a.douleurs, '#8A5A00');
      h += listBlock('🎯 Ce qui pousse à ces douleurs (causes profondes)', a.causes_profondes, '#8A5A00');
      h += '</div>';
    }

    h += listBlock('✓ Éléments convergents', a.elements_convergents, '#3E6B3E');
    h += listBlock('⟷ Éléments divergents (à clarifier)', a.elements_divergents, '#B8860B');

    h += '</div>';
    return h;
  }

  async function loadLeadDetail() {
    try {
      const url = CRM_DETAIL_API + '?lead_id=' + encodeURIComponent(leadId) + '&account_id=' + encodeURIComponent(session.account_id);
      const resp = await fetch(url);
      const data = await resp.json();

      if (!data.lead) {
        document.getElementById('pageContent').innerHTML = '<div class="loading-state">Lead introuvable ou accès non autorisé.</div>';
        return;
      }

      render(data);
    } catch (err) {
      document.getElementById('pageContent').innerHTML = '<div class="loading-state">Erreur de chargement. Réessayez.</div>';
    }
  }

  function render(data) {
    const l = data.lead;
    const fullName = ((l.prenom || '') + ' ' + (l.nom || '')).trim() || 'Lead sans nom';
    const statutMap = {
      client: { label: 'Client', cls: 'status-buyer' },
      diagnostique: { label: 'Diagnostiqué', cls: 'status-diagnosed' },
      diagnostic_envoye: { label: 'Diagnostic envoyé', cls: 'status-diagnosed' },
      chaud: { label: 'Lead chaud 🔥', cls: 'status-diagnosed' },
      nouveau: { label: 'Prospect', cls: 'status-prospect' }
    };
    const statutInfo = statutMap[l.statut_global] || (
      (l.a_achete == 1 || l.a_achete === true)
        ? statutMap.client
        : statutMap.nouveau
    );
    const buyerChip = '<span class="status-chip ' + statutInfo.cls + '">' + statutInfo.label + '</span>';

    const typeLabels = { SW:'Show Webinaire', SC:'Show Challenge', SB:'Show Bootcamp', RP:'Roqya Personne', RM:'Roqya Maison / Bureau', DD:'Diagnostic payant', Fr:'Formation Academy', AA:'Application', AP:'Produits' };
    const tempIcons = { Froid: '❄️', Tiede: '🌤️', Chaud: '🔥' };

    let html = '';

    // ===== HEADER =====
    html += '<div class="lead-header">';
    html += '<div>';
    const isShowType = ['SW','SC','SB'].includes(l.type_client);
    html += '<h1 class="lead-name">' + esc(fullName)
      + (l.type_client ? ' <span class="type-badge" title="' + (typeLabels[l.type_client] || '') + '">' + esc(l.type_client) + '</span>' : '')
      + ((isShowType && (l.is_vip == 1 || l.is_vip === true)) ? ' <span title="Ticket VIP" style="font-size:20px">👑</span>' : '')
      + (tempIcons[l.statut_suivi] ? ' <span title="' + esc(l.statut_suivi) + '" style="font-size:18px">' + tempIcons[l.statut_suivi] + '</span>' : '')
      + '</h1>';
    html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 6px">';
    html += '<span class="header-chip" style="background:#F2EEE4;border-color:#B8965A"><b>💰 Total payé : ' + (parseFloat(l.montant_total_paye || 0)).toFixed(2) + ' CHF</b></span>';
    html += '<span class="header-chip">🧾 ' + (l.nombre_paiements || 0) + ' paiement(s)</span>';
    if (l.type_client) html += '<span class="header-chip">🏷️ ' + esc(typeLabels[l.type_client] || l.type_client) + '</span>';
    if (l.roqya_status && l.roqya_status !== 'none') html += '<span class="header-chip">🕌 Roqya : ' + esc(l.roqya_status === 'in_progress' ? 'en cours' : 'terminée') + '</span>';
    if (l.tally_type) html += '<span class="header-chip">📋 ' + esc(l.tally_type) + '</span>';
    html += '</div>';

    // ==== Bannière obligation Diagnostic Tally (RP / RM) ====
    const tallyObligatoire = ['RP','RM'].includes(l.type_client) || l.tally_exige == 1;
    if (tallyObligatoire) {
      if (l.a_rempli_diagnostic == 1) {
        html += '<div style="margin:8px 0;padding:11px 16px;border-radius:10px;background:#EDF4ED;border:1px solid #5A8C5A;color:#3E6B3E;font-size:13px;font-weight:600">✅ Diagnostic Tally obligatoire — REMPLI' + (l.date_diagnostic ? ' le ' + fmtDate(l.date_diagnostic) : '') + '</div>';
      } else {
        html += '<div style="margin:8px 0;padding:11px 16px;border-radius:10px;background:#FBEFEB;border:1px solid #C4604E;color:#A33F2E;font-size:13px;font-weight:700">⚠️ DIAGNOSTIC TALLY OBLIGATOIRE pour ce client (Roqya) — pas encore rempli. Envoie-lui le lien ci-dessous. 👇</div>';
      }
    }
    html += '<div class="lead-contact">';
    if (l.email) html += '<span>✉️ ' + esc(l.email) + '</span>';
    if (l.whatsapp) html += '<span>📱 ' + esc(l.whatsapp) + '</span>';
    html += '<span>📅 Inscrit le ' + fmtDate(l.date_inscription) + '</span>';
    if (l.date_diagnostic) html += '<span>🩺 Diagnostiqué le ' + fmtDate(l.date_diagnostic) + '</span>';
    html += '</div>';
    html += '<div class="source-tags">';
    if (l.source) html += '<span class="tag">Source : ' + esc(l.source) + '</span>';
    if (l.campagne) html += '<span class="tag">Campagne : ' + esc(l.campagne) + '</span>';
    if (l.statut_webinaire) html += '<span class="tag">Webinaire : ' + esc(l.statut_webinaire) + '</span>';
    html += '</div>';
    html += '<div class="diagnostic-action" style="margin-top:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">';
    if (l.a_rempli_diagnostic == 1) {
      // Diagnostic déjà rempli : on propose d'envoyer le RÉSULTAT + RDV, plus jamais le lien Tally
      const resultatEnvoye = (l.statut_global === 'resultat_envoye');
      if (resultatEnvoye) {
        html += '<span style="display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:#3E6B3E;background:#E9F2E9;padding:5px 10px;border-radius:6px">✓ Résultat envoyé au client</span>';
      } else {
        html += '<button onclick="sendDiagnosticResult(' + l.id + ')" id="sendResultBtnDetail" style="padding:7px 14px;border:none;border-radius:6px;background:#5A8C5A;color:#fff;font-weight:600;font-size:13px;cursor:pointer">Envoyer résultat + RDV</button>';
      }
    } else {
      // Diagnostic pas encore rempli : on gère l'acceptation + l'envoi du lien Tally
      html += '<label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">';
      html += '<input type="checkbox" id="diagnosticAccepteChk" ' + (l.diagnostic_accepte == 1 ? 'checked' : '') + ' onchange="toggleDiagnosticAccepte(' + l.id + ', this.checked)"> Diagnostic accepté';
      html += '</label>';
      const dejaEnvoye = (l.statut_tally === 'envoye');
      if (dejaEnvoye) {
        html += '<span style="display:' + (l.diagnostic_accepte == 1 ? 'inline-flex' : 'none') + ';align-items:center;gap:6px;font-size:12.5px;color:#3E6B3E;background:#E9F2E9;padding:5px 10px;border-radius:6px" id="sendDiagnosticWrap">✓ Lien déjà envoyé — en attente de réponse du client</span>';
      } else {
        html += '<div id="sendDiagnosticWrap" style="display:' + (l.diagnostic_accepte == 1 ? 'flex' : 'none') + ';align-items:center;gap:8px">';
        html += '<select id="langueDiagDetail" style="padding:6px 9px;border-radius:6px;border:1px solid #E5DECF;font-size:13px">';
        html += '<option value="fr">🇫🇷 Français</option><option value="ar">🇸🇦 Arabe</option><option value="al">🇦🇱 Albanais</option><option value="de">🇩🇪 Allemand</option>';
        html += '</select>';
        html += '<button onclick="sendDiagnosticLink(' + l.id + ')" id="sendDiagBtnDetail" style="padding:7px 14px;border:none;border-radius:6px;background:#B8965A;color:#0D1A12;font-weight:600;font-size:13px;cursor:pointer">Envoyer le lien diagnostic</button>';
        html += '</div>';
      }
    }
    html += '</div>';
    html += '</div>';
    html += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px">';
    html += buyerChip;
    html += '<button onclick="window.print()" style="padding:8px 18px;border:none;border-radius:6px;background:var(--gold);color:var(--green-deep);font-weight:700;font-size:13px;cursor:pointer">🖨️ Imprimer</button>';
    html += '</div>';
    html += '</div>';

    // ===== DIAGNOSTIC =====
    html += sectionWrap('🩺', 'Diagnostic', data.diagnostics.length, () => {
      if (data.diagnostics.length === 0) return '<div class="empty-row">Aucun diagnostic enregistré.</div>';
      return data.diagnostics.map(d => {
        const color = scoreColor(d.score_gravite * 10);
        let block = '<div class="diag-grid">' +
          '<div class="diag-item" style="grid-column:1 / -1; display:flex; align-items:center; gap:12px;">' +
            '<div class="score-badge" style="background:' + color + '">' + esc(d.score_gravite) + '</div>' +
            '<div><div class="diag-label">Score de gravité (sur 10)</div></div>' +
          '</div>' +
          '<div class="diag-item" style="grid-column:1 / -1"><div class="diag-label">Symptômes</div><div class="diag-value">' + esc(d.symptomes || d.symptoms_selected || '—') + '</div></div>' +
          '<div class="diag-item" style="grid-column:1 / -1"><div class="diag-label">Attente du client</div><div class="diag-value">' + esc(d.attente_client || d.desired_result || '—') + '</div></div>' +
          ((d.urgency_level || d.motivation_score) ?
            '<div class="diag-item"><div class="diag-label">Urgence</div><div class="diag-value">' + esc(d.urgency_level || '—') + ' / 10</div></div>' +
            '<div class="diag-item"><div class="diag-label">Motivation</div><div class="diag-value">' + esc(d.motivation_score || '—') + ' / 10</div></div>'
            : '') +
        '</div>';
        // ==== Analyses Ayrika (9 couches) ====
        if (d.ai_summary) block += '<div class="ayrika-block"><div class="ayrika-title">🤖 Résumé IA</div>' + esc(d.ai_summary) + '</div>';
        if (d.traditional_analysis) block += '<div class="ayrika-block"><div class="ayrika-title">🕌 Analyse traditionnelle (Roqya)</div>' + esc(d.traditional_analysis) + '</div>';
        if (d.psychological_analysis) block += '<div class="ayrika-block"><div class="ayrika-title">🧠 Analyse psychologique</div>' + esc(d.psychological_analysis) + '</div>';
        if (d.emotional_analysis) block += '<div class="ayrika-block"><div class="ayrika-title">💬 Langage & émotions</div>' + esc(d.emotional_analysis) + '</div>';
        if (d.ayrika_analysis) block += renderAyrika(d.ayrika_analysis);
        if (d.recommended_action || d.recommended_program) {
          block += '<div class="ayrika-block" style="background:#F2EEE4"><div class="ayrika-title">🎯 Recommandation</div>' +
            (d.recommended_action ? '<b>Action :</b> ' + esc(d.recommended_action) + '<br>' : '') +
            (d.recommended_program ? '<b>Programme :</b> ' + esc(d.recommended_program) : '') + '</div>';
        }
        return block;
      }).join('<hr style="border:none;border-top:1px solid var(--border-soft);margin:14px 0">');
    });

    // ===== ANALYSE IA =====
    html += sectionWrap('🤖', 'Analyse IA', data.analyses.length, () => {
      if (data.analyses.length === 0) return '<div class="empty-row">Aucune analyse IA pour ce lead.</div>';
      // Déduplique par id pour éviter les doublons de données de test
      const seen = new Set();
      const unique = data.analyses.filter(a => { if (seen.has(a.id)) return false; seen.add(a.id); return true; });
      return unique.map(a => {
        const color = scoreColor(a.score_chaud);
        return '<div class="ai-block">' +
          '<div class="ai-row"><div class="score-badge" style="background:' + color + '">' + esc(a.score_chaud) + '</div><div><strong>Score chaud</strong><br><span style="color:var(--text-soft);font-size:12px">' + fmtDate(a.date_analyse) + '</span></div></div>' +
          '<div class="ai-row">' + esc(a.analyse_psycho || '—') + '</div>' +
          (a.points_douleur ? '<div class="ai-row"><strong>Points de douleur :</strong>&nbsp;' + esc(a.points_douleur) + '</div>' : '') +
          (a.mots_a_utiliser ? '<div class="ai-row ai-tag-good">✓ Mots à utiliser : ' + esc(a.mots_a_utiliser) + '</div>' : '') +
          (a.mots_a_eviter ? '<div class="ai-row ai-tag-bad">✗ Mots à éviter : ' + esc(a.mots_a_eviter) + '</div>' : '') +
        '</div>';
      }).join('');
    });

    // ===== VENTES =====
    html += sectionWrap('💰', 'Ventes', data.sales.length, () => {
      if (data.sales.length === 0) return '<div class="empty-row">Aucune vente enregistrée.</div>';
      return data.sales.map(s =>
        '<div class="timeline-item">' +
          '<div class="timeline-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>' +
          '<div class="timeline-content">' +
            '<div class="timeline-title">' + esc(s.produit) + (s.product_type ? ' <span class="type-badge" style="font-size:10px">' + esc(s.product_type) + '</span>' : '') + '</div>' +
            '<div class="timeline-meta">' + esc(s.canal_vente || '—') + (s.mode_paiement ? ' · ' + esc(s.mode_paiement) : '') + ' · ' + esc(s.statut_paiement || '—') + ' · ' + fmtDate(s.date_vente) + '</div>' +
          '</div>' +
          '<div class="timeline-amount">' + parseFloat(s.montant).toFixed(2) + ' CHF</div>' +
        '</div>'
      ).join('');
    });

    // ===== RENDEZ-VOUS =====
    html += sectionWrap('📅', 'Rendez-vous', data.appointments.length, () => {
      if (data.appointments.length === 0) return '<div class="empty-row">Aucun rendez-vous planifié.</div>';
      return data.appointments.map(a =>
        '<div class="timeline-item">' +
          '<div class="timeline-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>' +
          '<div class="timeline-content">' +
            '<div class="timeline-title">' + fmtDateTime(a.date_rdv) + '</div>' +
            '<div class="timeline-meta">Statut : ' + esc(a.statut) + '</div>' +
          '</div>' +
        '</div>'
      ).join('');
    });

    // ===== APPELS =====
    html += sectionWrap('📞', 'Appels téléphoniques', data.calls.length, () => {
      if (data.calls.length === 0) return '<div class="empty-row">Aucun appel enregistré.</div>';
      return data.calls.map(c =>
        '<div class="timeline-item">' +
          '<div class="timeline-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div>' +
          '<div class="timeline-content">' +
            '<div class="timeline-title">' + esc(c.objectif) + ' — ' + esc(c.resultat) + '</div>' +
            '<div class="timeline-meta">' + esc(c.duree) + ' min · ' + fmtDate(c.date_appel) + (c.notes ? '<br>' + esc(c.notes) : '') + '</div>' +
          '</div>' +
        '</div>'
      ).join('');
    });

    // ===== EMAILS =====
    html += sectionWrap('✉️', 'Historique emails', data.emails.length, () => {
      if (data.emails.length === 0) return '<div class="empty-row">Aucun email envoyé.</div>';
      return data.emails.map(e =>
        '<div class="timeline-item">' +
          '<div class="timeline-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>' +
          '<div class="timeline-content">' +
            '<div class="timeline-title">' + esc(e.type_email) + '</div>' +
            '<div class="timeline-meta">' + esc(e.plateforme || '—') + ' · ' + fmtDate(e.date_envoi) + ' · ' + (e.ouvert ? '👁️ Ouvert' : 'Non ouvert') + (e.clique ? ' · 🔗 Cliqué' : '') + '</div>' +
          '</div>' +
        '</div>'
      ).join('');
    });

    document.getElementById('pageContent').innerHTML = html;
  }

  async function toggleDiagnosticAccepte(leadId, checked) {
    document.getElementById('sendDiagnosticWrap').style.display = checked ? 'flex' : 'none';
    try {
      await fetch('https://n8n.srv936251.hstgr.cloud/webhook/crm-toggle-diagnostic-accepte', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lead_id: leadId, account_id: session.account_id, accepted: checked })
      });
    } catch (err) {
      // silencieux — l'état visuel reste correct, la prochaine sauvegarde réussira
    }
  }

  async function sendDiagnosticLink(leadId) {
    const langue = document.getElementById('langueDiagDetail').value;
    const btn = document.getElementById('sendDiagBtnDetail');
    btn.disabled = true;
    btn.textContent = 'Envoi en cours…';
    try {
      const resp = await fetch('https://n8n.srv936251.hstgr.cloud/webhook/crm-send-diagnostic-link', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lead_ids: [leadId], langue, account_id: session.account_id })
      });
      const data = await resp.json();
      if (data.success) {
        btn.textContent = 'Lien envoyé ✓';
      } else {
        btn.disabled = false;
        btn.textContent = 'Envoyer le lien diagnostic';
        alert('Erreur lors de l\'envoi. Réessayez.');
      }
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Envoyer le lien diagnostic';
      alert('Erreur de connexion. Réessayez.');
    }
  }

  async function sendDiagnosticResult(leadId) {
    const btn = document.getElementById('sendResultBtnDetail');
    btn.disabled = true;
    btn.textContent = 'Envoi en cours…';
    try {
      const resp = await fetch('https://n8n.srv936251.hstgr.cloud/webhook/crm-send-diagnostic-result', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lead_id: leadId })
      });
      const data = await resp.json();
      if (data.success) {
        btn.textContent = 'Résultat envoyé ✓';
        loadLeadDetail();
      } else {
        btn.disabled = false;
        btn.textContent = 'Envoyer résultat + RDV';
        alert('Erreur lors de l\'envoi. Réessayez.');
      }
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Envoyer résultat + RDV';
      alert('Erreur de connexion. Réessayez.');
    }
  }

  function sectionWrap(emoji, title, count, bodyFn) {
    return '<div class="section">' +
      '<div class="section-head">' +
        '<span style="font-size:18px">' + emoji + '</span>' +
        '<h2 class="section-title">' + title + '</h2>' +
        '<span class="section-count">' + count + '</span>' +
      '</div>' +
      '<div class="section-body">' + bodyFn() + '</div>' +
    '</div>';
  }
</script>
