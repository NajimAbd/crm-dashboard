<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa — Webinaires & Challenges</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --green-deep: #0D1A12;
    --gold: #B8965A;
    --gold-light: #D4AF7A;
    --cream: #F4ECE0;
    --bg-soft: #FAF7F1;
    --text-main: #2C2C2A;
    --text-soft: #6B6B68;
    --border-soft: #E5DECF;
    --blue-soft: #4A7BA6;
    --purple-soft: #8B6FB0;
  }

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg-soft); font-family: 'Inter', sans-serif; color: var(--text-main); min-height: 100vh; }

  .topbar { background: var(--green-deep); color: var(--cream); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--gold); }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .brand-mark { width: 34px; height: 34px; }
  .brand-text { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 22px; color: var(--cream); }
  .brand-sub { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-top: 2px; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .nav-link { color: var(--gold-light); text-decoration: none; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .nav-link:hover { color: var(--cream); }
  .logout-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; background: rgba(224, 104, 90, 0.12); border: 1px solid rgba(224, 104, 90, 0.35); border-radius: 24px; color: #E0685A; cursor: pointer; font-size: 13px; font-family: 'Inter', sans-serif; }
  .logout-btn:hover { background: rgba(224, 104, 90, 0.22); }

  .page { max-width: 1100px; margin: 0 auto; padding: 36px 32px 60px; }
  .page-header { margin-bottom: 28px; }
  .eyebrow { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); font-weight: 600; margin-bottom: 8px; }
  h1 { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 36px; margin: 0 0 6px; color: var(--green-deep); }
  .subtitle { color: var(--text-soft); font-size: 14px; }

  .site-card {
    background: white; border: 1px solid var(--border-soft); border-radius: 14px;
    margin-bottom: 20px; overflow: hidden;
  }
  .site-header {
    padding: 20px 24px; background: #F4EFE3; border-bottom: 1px solid var(--border-soft);
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
  }
  .site-name {
    font-family: 'Cormorant Garamond', serif; font-size: 21px; font-weight: 600; color: var(--green-deep);
  }
  .site-meta { font-size: 12px; color: var(--text-soft); margin-top: 3px; }
  .type-chip {
    display: inline-block; padding: 3px 11px; border-radius: 11px; font-size: 11px;
    font-weight: 600; text-transform: capitalize; background: rgba(184, 150, 90, 0.15); color: #8B6E3A;
  }
  .lead-count-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text-soft);
    background: white; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border-soft);
  }
  .lead-count-badge b { color: var(--green-deep); font-size: 15px; }

  .site-body { padding: 18px 24px; }
  .content-row { display: flex; gap: 24px; flex-wrap: wrap; }
  .content-col { flex: 1; min-width: 260px; }
  .content-col-title {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-soft);
    font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
  }

  .item-card {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border-radius: 10px; background: #FBF9F4; margin-bottom: 8px;
  }
  .item-icon {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
  }
  .item-icon.webinar { background: rgba(74, 123, 166, 0.15); color: var(--blue-soft); }
  .item-icon.challenge { background: rgba(139, 111, 176, 0.15); color: var(--purple-soft); }
  .item-title { font-size: 13px; font-weight: 600; color: var(--text-main); }
  .item-meta { font-size: 11px; color: var(--text-soft); margin-top: 1px; }

  .empty-mini { font-size: 12px; color: var(--text-soft); font-style: italic; padding: 6px 0; }

  .empty-state, .loading-state { text-align: center; padding: 80px 24px; color: var(--text-soft); }
  .spinner { width: 28px; height: 28px; border: 2.5px solid var(--border-soft); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    .page { padding: 24px 16px 50px; }
    .content-row { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <svg class="brand-mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="50" rx="46" ry="46" fill="none" stroke="#B8965A" stroke-width="3"/>
      <circle cx="50" cy="50" r="6" fill="#B8965A"/>
      <path d="M50 18 L50 38 M50 62 L50 82 M18 50 L38 50 M62 50 L82 50" stroke="#B8965A" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <div>
      <div class="brand-text">Nexa</div>
      <div class="brand-sub">Platform CRM</div>
    </div>
  </div>
  <div class="topbar-right">
    <a class="nav-link" onclick="window.location.href='dashboard.html'">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Tableau de bord
    </a>
    <button class="logout-btn" onclick="logout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Déconnexion
    </button>
  </div>
</div>

<div class="page">

  <div class="page-header">
    <div class="eyebrow">Contenu & Acquisition</div>
    <h1>Webinaires & Challenges</h1>
    <div class="subtitle" id="subtitleCount">Chargement…</div>
  </div>

  <div id="sitesContainer">
    <div class="loading-state">
      <div class="spinner"></div>
      <div>Chargement de vos sites…</div>
    </div>
  </div>

</div>

<script>
  const CRM_SITES_API = 'https://n8n.srv936251.hstgr.cloud/webhook/crm-sites-content';
  const SESSION_KEY = 'crm_session_user';
  const SESSION_EXPIRY = 'crm_session_expiry';

  function getSession() {
    try {
      const raw = localStorage.getItem(SESSION_KEY);
      const expiry = parseInt(localStorage.getItem(SESSION_EXPIRY) || '0');
      if (!raw || Date.now() >= expiry) return null;
      return JSON.parse(raw);
    } catch (e) { return null; }
  }
  function logout() {
    localStorage.removeItem(SESSION_KEY);
    localStorage.removeItem(SESSION_EXPIRY);
    window.location.href = 'index.html';
  }

  const session = getSession();
  if (!session) {
    window.location.href = 'index.html';
    throw new Error('No session');
  }

  function esc(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function fmtDate(d) {
    if (!d) return 'Date non définie';
    return new Date(d.replace(' ', 'T')).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  async function loadSites() {
    try {
      const resp = await fetch(CRM_SITES_API + '?account_id=' + encodeURIComponent(session.account_id));
      const data = await resp.json();
      const sites = data.sites || [];
      document.getElementById('subtitleCount').textContent = sites.length + ' site(s) au total';
      render(sites);
    } catch (err) {
      document.getElementById('sitesContainer').innerHTML = '<div class="empty-state">Impossible de charger vos sites.</div>';
    }
  }

  function render(sites) {
    const container = document.getElementById('sitesContainer');
    if (sites.length === 0) {
      container.innerHTML = '<div class="empty-state">Aucun site créé pour le moment.</div>';
      return;
    }

    let html = '';
    sites.forEach(site => {
      html += '<div class="site-card">';
      html += '<div class="site-header">';
      html += '<div>';
      html += '<div class="site-name">' + esc(site.nom_site) + '</div>';
      html += '<div class="site-meta"><span class="type-chip">' + esc(site.type || 'site') + '</span> &nbsp;/' + esc(site.url_slug || '') + '</div>';
      html += '</div>';
      html += '<div class="lead-count-badge"><b>' + site.lead_count + '</b> lead(s)</div>';
      html += '</div>';

      html += '<div class="site-body"><div class="content-row">';

      // Webinaires
      html += '<div class="content-col">';
      html += '<div class="content-col-title">🎥 Webinaires (' + site.webinars.length + ')</div>';
      if (site.webinars.length === 0) {
        html += '<div class="empty-mini">Aucun webinaire sur ce site.</div>';
      } else {
        site.webinars.forEach(w => {
          html += '<div class="item-card">' +
            '<div class="item-icon webinar">🎥</div>' +
            '<div><div class="item-title">' + esc(w.titre) + '</div><div class="item-meta">' + fmtDate(w.date_webinar) + '</div></div>' +
          '</div>';
        });
      }
      html += '</div>';

      // Challenges
      html += '<div class="content-col">';
      html += '<div class="content-col-title">🏆 Challenges (' + site.challenges.length + ')</div>';
      if (site.challenges.length === 0) {
        html += '<div class="empty-mini">Aucun challenge sur ce site.</div>';
      } else {
        site.challenges.forEach(c => {
          html += '<div class="item-card">' +
            '<div class="item-icon challenge">🏆</div>' +
            '<div><div class="item-title">' + esc(c.titre) + '</div><div class="item-meta">' + esc(c.type || '') + '</div></div>' +
          '</div>';
        });
      }
      html += '</div>';

      html += '</div></div>'; // content-row, site-body
      html += '</div>'; // site-card
    });

    container.innerHTML = html;
  }

  loadSites();
</script>

</body>
</html>
